<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 120" width="580" height="120">
  <defs>
    <linearGradient id="arcW" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A7A8A"/>
      <stop offset="55%" stop-color="#0F4A5A"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <filter id="glowW">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- C-Spark mark (centred in 120x120 left panel) -->
  <g transform="translate(0,0)">
    <path d="M 93,43 A 40,40 0 1 0 93,77"
          fill="none" stroke="url(#arcW)" stroke-width="19" stroke-linecap="round"/>
    <path d="M 87,49 A 30,30 0 1 0 87,71"
          fill="none" stroke="#22A0B4" stroke-width="3" stroke-linecap="round" opacity="0.22"/>
    <circle cx="93" cy="43" r="13" fill="#C9A84C" filter="url(#glowW)"/>
    <circle cx="93" cy="43" r="8"  fill="#E8C96A"/>
    <circle cx="93" cy="43" r="4"  fill="white"/>
    <circle cx="93" cy="77" r="5"  fill="#1A7A8A" opacity="0.55"/>
  </g>

  <!-- Thin vertical divider -->
  <line x1="128" y1="24" x2="128" y2="96" stroke="#E0E4EC" stroke-width="1.5"/>

  <!-- Wordmark: CLARIVANCE -->
  <text x="144" y="74"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="42" font-weight="700"
        letter-spacing="4"
        fill="#0A1628">CLARIVANCE</text>

  <!-- AI badge pill -->
  <rect x="145" y="82" width="46" height="22" rx="5" fill="#1A7A8A"/>
  <text x="168" y="97"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="800"
        fill="white" text-anchor="middle"
        letter-spacing="3">AI</text>

  <!-- Tagline -->
  <text x="196" y="100"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="11" font-weight="400"
        fill="#8D9BAD" letter-spacing="2.5"
        text-anchor="start">FINANCIAL INTELLIGENCE</text>
</svg>
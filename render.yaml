services:
  - type: web
    name: clarivance-ai
    runtime: static
    buildCommand: npm install -g bun && bun install && bun run build
    staticPublishPath: ./dist/client
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  # Secure form -> Airtable proxy. Holds the Airtable token server-side.
  - type: web
    name: clarivance-waitlist
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # Secrets: set the actual values in the Render dashboard, not here.
      - key: AIRTABLE_TOKEN
        sync: false
      - key: AIRTABLE_BASE_ID
        sync: false
      - key: AIRTABLE_TABLE
        value: Waitlist
      - key: ALLOWED_ORIGINS
        sync: false
